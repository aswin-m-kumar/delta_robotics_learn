<!DOCTYPE html><html class="light" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Delta Robotics - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;700;800&amp;family=Inter:wght@400;500;600&amp;family=JetBrains+Mono:wght@500&amp;display=swap" rel="stylesheet">

                        "tertiary": "#586062",

                        "on-tertiary-fixed-variant": "#41484a",

                        "surface-container-highest": "#e1e3e4",

                        "tertiary-fixed-dim": "#c1c8ca",

                        "primary": "#a04100",
                        "on-surface-variant": "#5a4136",
                        "outline-variant": "#e2bfb0",

                        "on-surface": "#191c1d",
                        "secondary-fixed": "#e5e2e1",

<style>
        .role-card {
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .role-card.active {
            border-color: #ff6b00;
            background-color: rgba(255, 107, 0, 0.05);
        }
        .role-card.active .material-symbols-outlined {
            color: #ff6b00;
        }
        .role-card:not(.active):hover {
            border-color: #e5e7eb;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased">
<!-- Suppressed TopAppBar and Footer as this is a transactional Login screen (per Semantic Shell Mandate) -->
<header class="w-full py-base px-margin-mobile md:px-margin-desktop bg-surface border-b border-outline-variant flex justify-center items-center h-[72px]">
<div class="font-headline-md text-headline-md font-bold text-primary">Delta Robotics</div>
</header>
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop relative overflow-hidden">
<!-- Background Graphic -->
<div class="absolute inset-0 z-0 opacity-10 pointer-events-none flex items-center justify-center">
<div class="w-[800px] h-[800px] rounded-full border-[40px] border-primary-container blur-3xl"></div>
</div>
<div class="bg-surface-container-lowest border border-surface-variant rounded-xl shadow-[0_4px_20px_rgba(0,0,0,0.05)] w-full max-w-lg p-md md:p-lg z-10 relative">
<div class="text-center mb-lg">
<h1 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg mb-xs">Welcome Back</h1>
<p class="font-body-md text-body-md text-secondary">Sign in to continue your robotics journey.</p>
</div>
<form class="space-y-md" id="loginForm">
<!-- Role Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-sm uppercase tracking-wide">Select Role</label>
<div class="grid grid-cols-3 gap-sm">
<div class="role-card active border border-outline-variant rounded-lg p-sm flex flex-col items-center justify-center text-center h-24" data-role="student" onclick="selectRole('student')">
<span class="material-symbols-outlined text-3xl mb-xs transition-colors text-primary-container" style="font-variation-settings: 'FILL' 0;">school</span>
<span class="font-label-md text-label-md text-on-background font-semibold">Student</span>
</div>
<div class="role-card border border-outline-variant rounded-lg p-sm flex flex-col items-center justify-center text-center h-24" data-role="intern" onclick="selectRole('intern')">
<span class="material-symbols-outlined text-3xl mb-xs text-secondary transition-colors" style="font-variation-settings: 'FILL' 0;">engineering</span>
<span class="font-label-md text-label-md text-on-background font-semibold">Intern</span>
</div>
<div class="role-card border border-outline-variant rounded-lg p-sm flex flex-col items-center justify-center text-center h-24" data-role="admin" onclick="selectRole('admin')">
<span class="material-symbols-outlined text-3xl mb-xs text-secondary transition-colors" style="font-variation-settings: 'FILL' 0;">admin_panel_settings</span>
<span class="font-label-md text-label-md text-on-background font-semibold">Admin</span>
</div>
</div>
<input id="selectedRole" name="role" type="hidden" value="student">
</div>
<!-- Credentials -->
<div class="space-y-sm">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-xs" for="email">Email Address</label>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-DEFAULT px-sm py-sm font-body-md text-body-md text-on-background focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="email" placeholder="name@deltarobotics.edu" required="" type="email">
</div>
<div>
<div class="flex justify-between items-center mb-xs">
<label class="block font-label-md text-label-md text-on-surface" for="password">Password</label>
<a class="font-label-md text-label-md text-primary-container hover:underline" href="#">Forgot Password?</a>
</div>
<input class="w-full bg-surface-container-lowest border border-surface-variant rounded-DEFAULT px-sm py-sm font-body-md text-body-md text-on-background focus:outline-none focus:border-primary-container focus:ring-1 focus:ring-primary-container transition-colors" id="password" placeholder="••••••••" required="" type="password">
</div>
</div>
<!-- Actions -->
<div class="pt-sm">
<button class="w-full bg-primary-container text-on-primary font-headline-md text-headline-md font-bold uppercase rounded-lg py-sm hover:opacity-90 transition-opacity flex justify-center items-center gap-xs" type="submit">
                        Login <span class="material-symbols-outlined text-xl" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
</button>
</div>
</form>
<!-- Sign-up Link -->
<div class="mt-lg text-center border-t border-surface-variant pt-md">
<p class="font-body-md text-body-md text-secondary">
                    New to Delta Robotics? <a class="text-primary-container font-semibold hover:underline" href="#">Sign up here</a>
</p>
</div>
</div>
</main>
<footer class="w-full py-md px-margin-mobile md:px-margin-desktop bg-surface-container flex flex-col md:flex-row justify-between items-center gap-md text-center md:text-left h-[80px]">
<div class="font-body-md text-body-md text-on-secondary-fixed-variant">© 2024 Delta Robotics Platforms. All rights reserved.</div>
</footer>
<script>
        function selectRole(role) {
            document.querySelectorAll('.role-card').forEach(card => {
                card.classList.remove('active');
                card.querySelector('.material-symbols-outlined').classList.remove('text-primary-container');
                card.querySelector('.material-symbols-outlined').classList.add('text-secondary');
            });
            
            const selected = document.querySelector(`.role-card[data-role="${role}"]`);
            selected.classList.add('active');
            selected.querySelector('.material-symbols-outlined').classList.add('text-primary-container');
            selected.querySelector('.material-symbols-outlined').classList.remove('text-secondary');
            
            document.getElementById('selectedRole').value = role;
        }

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Form submission logic would go here
            console.log('Login attempt with role:', document.getElementById('selectedRole').value);
        });
    </script>


</body></html>
